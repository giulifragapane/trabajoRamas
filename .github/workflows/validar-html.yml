name: Validación HTML

on:
  push:
    branches:
      - main
      - 'feature/**'

jobs:
  validar-html:
    name: Verificar archivos HTML
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar validador HTML
        run: npm install -g html-validate

      - name: Validar archivos HTML
        run: html-validate "**/*.html"

  validar-archivos:
    name: Verificar archivos requeridos
    runs-on: ubuntu-latest
    needs: validar-html

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Verificar que existen los archivos HTML obligatorios
        run: |
          test -f index.html || (echo "Falta index.html" && exit 1)
          test -f contacto.html || (echo "Falta contacto.html" && exit 1)
          test -f about.html || (echo "Falta about.html" && exit 1)
          echo "Todos los archivos HTML requeridos están presentes"